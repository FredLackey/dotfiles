# Remove tmux's default prefix so it does not conflict with the custom one below.
unbind C-b

# Use Ctrl+A as the tmux prefix because it is easier to hit repeatedly over SSH.
set -g prefix C-a

# Allow Ctrl+A Ctrl+A to send a literal Ctrl+A through to applications inside tmux.
bind C-a send-prefix

# Reduce the delay tmux waits after Escape so mode changes feel more responsive.
set -sg escape-time 10

# Keep a deep scrollback buffer so long agent runs and logs remain reviewable.
set -g history-limit 200000

# Let tmux and the terminal cooperate on clipboard operations when supported.
set -g set-clipboard on

# Use vi-style keys in copy mode for faster navigation and selection.
setw -g mode-keys vi

# Turn on mouse support for pane selection, pane resizing, window selection, and wheel scrolling.
set -g mouse on

# Start window numbering at 1 so window numbers match normal human counting.
set -g base-index 1

# Start pane numbering at 1 for the same reason.
setw -g pane-base-index 1

# Automatically renumber windows after one is closed so numbering stays compact.
set -g renumber-windows on

# Make the status bar update more frequently so session information feels current.
set -g status-interval 5

# Show clearer activity markers when something changes in another window.
setw -g monitor-activity on

# Visually mark windows that have activity while you are elsewhere.
set -g visual-activity on

# Reload the tmux config with prefix+r instead of typing the full source-file command.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
